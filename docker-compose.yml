services:
  evidence:
    build:
      context: .
      dockerfile: evidence/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./data:/data:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    env_file:
      - path: .env
        required: false
